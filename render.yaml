services:
  - type: web
    name: contract-compliance-api
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.api
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: USE_MOCKS
        value: "true"

  - type: web
    name: contract-compliance-ui
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.ui
    dockerContext: .
    plan: free
    envVars:
      - key: API_BASE_URL
        fromService:
          type: web
          name: contract-compliance-api
          envVarKey: RENDER_EXTERNAL_URL
