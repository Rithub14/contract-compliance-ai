name: CD

on:
  workflow_dispatch:  # manual only — Render handles auto-deploy from GitHub

env:
  API_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/contract-compliance-api
  UI_IMAGE:  ${{ secrets.ACR_LOGIN_SERVER }}/contract-compliance-ui

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          tags: |
            ${{ env.UI_IMAGE }}:${{ github.sha }}
            ${{ env.UI_IMAGE }}:latest

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName:            ${{ secrets.ACR_NAME }}
          containerAppName:   ${{ secrets.API_APP_NAME }}
          resourceGroup:      ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy:      ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Deploy UI
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName:            ${{ secrets.ACR_NAME }}
          containerAppName:   ${{ secrets.UI_APP_NAME }}
          resourceGroup:      ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy:      ${{ env.UI_IMAGE }}:${{ github.sha }}
